# Database only — use when running the API on the host with `npm run dev`.
# Example: docker compose -f docker-compose.db.yml up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: underc0de-postgresql
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: underc0deDashboard
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d underc0deDashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
