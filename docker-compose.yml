services:
  postgres:
    image: postgres:15-alpine
    container_name: underc0de-postgresql
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: underc0deDashboard
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d underc0deDashboard"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: underc0de-migrate
    env_file:
      - .env.docker
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    command: ["npx", "sequelize-cli", "db:migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: underc0de-api
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      TZ: America/Argentina/Buenos_Aires
    ports:
      - "${PORT:-3002}:3002"
    volumes:
      - uploads_data:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3002/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
